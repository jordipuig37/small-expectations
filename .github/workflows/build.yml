name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Validate tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Tag version: $TAG_VERSION"
          echo "Project version: $PROJECT_VERSION"
          test "$TAG_VERSION" = "$PROJECT_VERSION"

      - name: Build package
        run: python -m build

      - name: Check if version exists on PyPI
        id: check_published
        run: |
          PACKAGE_NAME="small-expectations"
          VERSION="${GITHUB_REF_NAME#v}"
          PYPI_URL="https://pypi.org/pypi/$PACKAGE_NAME/json"

          if curl --silent $PYPI_URL | grep -q "\"$VERSION\""; then
            echo "Version $VERSION already exists"
            echo "published=true" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION not published"
            echo "published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to PyPI
        if: steps.check_published.outputs.published == 'false'
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: twine upload dist/*
